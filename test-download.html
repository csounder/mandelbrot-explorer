<!doctype html>
<html>
  <head>
    <title>Test Download</title>
  </head>
  <body>
    <h1>Test CSD Download</h1>
    <textarea id="csoundOutput" style="width: 500px; height: 300px">
; Test CSD File
<CsoundSynthesizer>
<CsOptions>
-odac
</CsOptions>
<CsInstruments>
sr = 44100
ksmps = 32
nchnls = 2
0dbfs = 1

instr 1
  aSig = oscili:a(0.5, 440, -1)
  out(aSig, aSig)
endin
</CsInstruments>
<CsScore>
i 1 0 2
e
</CsScore>
</CsoundSynthesizer>
</textarea
    >

    <br /><br />
    <button id="downloadBtn" onclick="testDownload()">Download Test CSD</button>
    <div id="status"></div>

    <script>
      function testDownload() {
        console.log("Download clicked");
        const csdContent = document.getElementById("csoundOutput").value;
        console.log("CSD length:", csdContent.length);

        const now = new Date();
        const dateStr = now.toISOString().split("T")[0];
        const timeStr = now.toTimeString().split(" ")[0].replace(/:/g, "-");
        const filename = `test_${dateStr}_${timeStr}.csd`;

        console.log("Creating blob...");
        const blob = new Blob([csdContent], { type: "text/plain" });
        console.log("Blob size:", blob.size);

        const url = URL.createObjectURL(blob);
        console.log("Blob URL:", url);

        const link = document.createElement("a");
        link.download = filename;
        link.href = url;

        console.log("Clicking link...");
        link.click();

        URL.revokeObjectURL(url);

        document.getElementById("status").textContent =
          "Downloaded: " + filename;
        console.log("Download complete");
      }
    </script>
  </body>
</html>
